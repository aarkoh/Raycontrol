function normalize(name){
  return name.toLowerCase().replace(/[.,]/g,'').replace(/\s+/g,' ').trim();
}

window.startImport=async function(){
  const btn=document.getElementById('importBtn');
  const progress=document.getElementById('progress');
  const bar=document.getElementById('bar');
  const done=document.getElementById('done');
  const warn=document.getElementById('warn');

  btn.disabled=true;btn.textContent='Importing…';
  warn.textContent='Do not close this page while importing.';

  await signInAnonymously(auth);

  // Step 1: Load all existing contacts
  progress.textContent='Loading existing contacts…';
  const snap=await get(ref(db,'contacts'));
  const contacts=snap.exists()?snap.val():{};
  
  // Build normalize map of existing contacts
  const existingMap={};
  for(const [id,c] of Object.entries(contacts)){
    existingMap[normalize(c.company||c.name||'')]=id;
  }

  let upgraded=0, added=0, failed=0;
  const total=BOTH_NAMES.length+VENDOR_ONLY.length;
  let done_count=0;
  const now=new Date().toISOString();

  // Step 2: Upgrade customer+vendor matches
  progress.textContent='Upgrading customer+vendor contacts…';
  for(const name of BOTH_NAMES){
    const existingId=existingMap[normalize(name)];
    try{
      if(existingId){
        await update(ref(db,'contacts/'+existingId),{types:['customer','vendor'],updatedAt:now});
        upgraded++;
      } else {
        // Not found - add as both
        await push(ref(db,'contacts'),{name,company:name,types:['customer','vendor'],paymentTerms:'',gst:false,phone:'',email:'',address:'',notes:'',persons:[],createdAt:now,updatedAt:now});
        added++;
      }
    }catch(e){failed++;}
    done_count++;
    bar.style.width=Math.round((done_count/total)*100)+'%';
    progress.textContent='Processed '+done_count+' of '+total+'…';
  }

  // Step 3: Add vendor-only contacts in batches
  progress.textContent='Adding vendor-only contacts…';
  const BATCH=10;
  for(let i=0;i<VENDOR_ONLY.length;i+=BATCH){
    const chunk=VENDOR_ONLY.slice(i,i+BATCH);
    await Promise.all(chunk.map(name=>{
      const existingId=existingMap[normalize(name)];
      if(existingId){
        // Already exists as customer - upgrade
        return update(ref(db,'contacts/'+existingId),{types:['customer','vendor'],updatedAt:now})
          .then(()=>{upgraded++;done_count++;})
          .catch(()=>{failed++;done_count++;});
      }
      return push(ref(db,'contacts'),{name,company:name,types:['vendor'],paymentTerms:'',gst:false,phone:'',email:'',address:'',notes:'',persons:[],createdAt:now,updatedAt:now})
        .then(()=>{added++;done_count++;})
        .catch(()=>{failed++;done_count++;});
    }));
    bar.style.width=Math.round((done_count/total)*100)+'%';
    progress.textContent='Processed '+done_count+' of '+total+'…';
    await new Promise(r=>setTimeout(r,50));
  }

  bar.style.width='100%';
  progress.textContent='';
  done.innerHTML='✓ <span style="color:#3B6D11">'+upgraded+' upgraded to Customer &amp; Vendor</span><br>✓ <span style="color:#854F0B">'+added+' new vendors added</span>'+(failed?'<br>⚠ '+failed+' failed':'');
  warn.textContent='Import complete. Delete this file from GitHub after use.';
  btn.textContent='Done';
};
