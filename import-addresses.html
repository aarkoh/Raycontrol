function normalize(name){
  return (name||'').toLowerCase().replace(/[.,]/g,'').replace(/\s+/g,' ').trim();
}

window.startImport=async function(){
  const btn=document.getElementById('importBtn');
  const progress=document.getElementById('progress');
  const bar=document.getElementById('bar');
  const done=document.getElementById('done');
  const warn=document.getElementById('warn');

  btn.disabled=true;
  btn.textContent='Importing…';
  warn.textContent='Do not close this page.';

  await signInAnonymously(auth);

  progress.textContent='Loading contacts from Firebase…';
  const snap=await get(ref(db,'contacts'));
  if(!snap.exists()){done.textContent='No contacts found in Firebase.';return;}
  const contacts=snap.val();

  let matched=0, skipped=0, notFound=0;
  const total=Object.keys(contacts).length;
  let processed=0;

  for(const [id, c] of Object.entries(contacts)){
    const key=normalize(c.company||c.name||'');
    const match=ADDRESSES[key];
    if(match){
      try{
        await update(ref(db,'contacts/'+id),{address:match.address});
        matched++;
      }catch(e){notFound++;}
    } else {
      notFound++;
    }
    processed++;
    if(processed%20===0){
      bar.style.width=Math.round((processed/total)*100)+'%';
      progress.textContent='Processed '+processed+' of '+total+' contacts… ('+matched+' matched)';
    }
    if(processed%100===0) await new Promise(r=>setTimeout(r,100));
  }

  bar.style.width='100%';
  progress.textContent='';
  done.textContent='✓ '+matched+' addresses updated! '+notFound+' contacts had no match.';
  warn.textContent='Import complete. Delete this file from GitHub after use.';
  btn.textContent='Done';
};
