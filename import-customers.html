window.startImport = async function(){
  const btn=document.getElementById('importBtn');
  const progress=document.getElementById('progress');
  const bar=document.getElementById('bar');
  const done=document.getElementById('done');
  const warn=document.getElementById('warn');

  btn.disabled=true;
  btn.textContent='Importing…';
  warn.textContent='Do not close this page while importing.';

  try{
    await signInAnonymously(auth);
  }catch(e){
    progress.textContent='Auth failed: '+e.message;
    btn.disabled=false;
    return;
  }

  const total=CUSTOMERS.length;
  let success=0, failed=0;
  const now=new Date().toISOString();
  const BATCH=10;

  for(let i=0;i<total;i+=BATCH){
    const chunk=CUSTOMERS.slice(i,i+BATCH);
    await Promise.all(chunk.map(name=>
      push(ref(db,'contacts'),{
        name,company:name,
        types:['customer'],
        paymentTerms:'',gst:false,
        phone:'',email:'',address:'',notes:'',
        persons:[],
        createdAt:now,updatedAt:now
      }).then(()=>success++).catch(()=>failed++)
    ));
    const pct=Math.round(((i+chunk.length)/total)*100);
    progress.textContent=`Imported ${Math.min(i+BATCH,total)} of ${total}…`;
    bar.style.width=pct+'%';
    await new Promise(r=>setTimeout(r,50));
  }

  bar.style.width='100%';
  progress.textContent='';
  if(failed===0){
    done.textContent='✓ All '+success+' customers imported successfully!';
    warn.textContent='You can now close this page. Delete this import file from GitHub after use.';
  } else {
    done.textContent=success+' imported, '+failed+' failed.';
    warn.textContent='Some imports failed. Refresh and try again, or check Firebase rules.';
  }
  btn.textContent='Done';
};
