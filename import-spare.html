signInAnonymously(auth).catch(e=>{document.getElementById('connStatus').textContent='Failed: '+e.message;document.getElementById('connStatus').style.color='#A32D2D';});
onAuthStateChanged(auth,user=>{
  if(user){document.getElementById('connStatus').textContent='✓ Connected — ready to import';document.getElementById('connStatus').style.color='#3B6D11';document.getElementById('btn').disabled=false;}
});
window.runImport=async function(){
  const btn=document.getElementById('btn'),progBox=document.getElementById('progBox'),progText=document.getElementById('progText'),barFill=document.getElementById('barFill'),doneBox=document.getElementById('doneBox'),errBox=document.getElementById('errBox');
  btn.disabled=true;btn.textContent='Importing…';progBox.style.display='block';errBox.style.display='none';
  let done=0,errors=[];
  for(let i=0;i<ITEMS.length;i++){
    try{await push(ref(db,'stock/items'),ITEMS[i]);done++;}
    catch(e){errors.push(ITEMS[i].name+': '+e.message);}
    barFill.style.width=Math.round(((i+1)/ITEMS.length)*100)+'%';
    progText.textContent='Importing '+done+' / '+ITEMS.length+'…';
    if(i%10===9) await new Promise(r=>setTimeout(r,300));
  }
  progBox.style.display='none';
  if(errors.length){errBox.innerHTML='<b>'+errors.length+' errors:</b><br>'+errors.join('<br>');errBox.style.display='block';}
  if(done>0){doneBox.innerHTML='&#10003; '+done+' items imported!<br><small style="font-weight:400;color:#555">Delete this file from GitHub when done.</small>';doneBox.style.display='block';}
  btn.textContent='Done';
};
